version: '3.8'

services:

  # ── Base de données PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: postgres-etudiants
    environment:
      POSTGRES_DB: etudiants_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - etudiants-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d etudiants_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Spring Boot 4 ──────────────────────────────────────────────────────
  api:
    build:
      context: ./api-spring-boot
      dockerfile: Dockerfile
    container_name: spring-etudiants-api
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/etudiants_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etudiants-network
    restart: on-failure

# ── Réseau partagé ─────────────────────────────────────────────────────────
networks:
  etudiants-network:
    driver: bridge

# ── Volume persistant pour PostgreSQL ──────────────────────────────────────
volumes:
  postgres_data:
