apiVersion: apps/v1
kind: Deployment
metadata:
  name: etudiant-deployment
  labels:
    app: etudiant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etudiant
  template:
    metadata:
      labels:
        app: etudiant
    spec:
      containers:
        - name: etudiant
          image: feridsaad/projet-etudiants-api:1.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-service:5432/etudiants_db"
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "071013"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          readinessProbe:
            httpGet:
              path: /api/etudiants
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: etudiant-service
spec:
  type: NodePort
  selector:
    app: etudiant
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080