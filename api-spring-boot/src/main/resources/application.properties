spring.application.name=etudiants-api

# ---------------------------------------------------------------------------
# DataSource — PostgreSQL local
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/etudiants_db
spring.datasource.username=postgres
spring.datasource.password=071013
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
# update : met à jour le schéma sans perdre les données existantes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------------------------
# Jackson — sérialise LocalDate en ISO-8601
# ---------------------------------------------------------------------------
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------------------
# Eureka Client
# ---------------------------------------------------------------------------
spring.application.name=etudiants-api
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ---------------------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------------------
server.port=8080