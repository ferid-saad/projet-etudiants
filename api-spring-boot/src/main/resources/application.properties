spring.application.name=etudiants-api

# ---------------------------------------------------------------------------
# DataSource — les variables d'environnement sont utilisées par Docker Compose
# En local, les valeurs par défaut (localhost) sont appliquées
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/etudiants_db?ssl=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:071013}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------------------
# Jackson — sérialise LocalDate en chaîne ISO-8601 ("2001-03-15")
# ---------------------------------------------------------------------------
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
# ---------------------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------------------
server.port=8081
